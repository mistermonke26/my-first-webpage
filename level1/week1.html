<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joke Time</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fff7ed;
      --card: #ffffff;
      --text: #1f2937;
      --accent: #f97316;
      --accent-dark: #ea580c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #ffedd5, #fffbeb);
      color: var(--text);
      padding: 24px;
    }

    main {
      width: min(560px, 100%);
      background: var(--card);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      color: var(--accent-dark);
    }

    p {
      font-size: 1.1rem;
      line-height: 1.5;
    }

    #punchline {
      margin-top: 18px;
      font-weight: 700;
    }

    button {
      margin-top: 12px;
      border: 0;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: 700;
      color: white;
      background: var(--accent);
      cursor: pointer;
      transition: transform 0.15s ease, background-color 0.15s ease;
    }

    button:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main>
    <h1>Joke of the Day 😂</h1>
    <p id="setup">Loading joke...</p>
    <button id="revealBtn" type="button">Reveal punchline</button>
    <p id="punchline" hidden>Loading punchline...</p>
  </main>

  <script>
    const jokes = [
      {
        setup: "Why do programmers prefer dark mode?",
        punchline: "Because light attracts bugs! 🐛"
      },
      {
        setup: "Why did the JavaScript developer wear glasses?",
        punchline: "Because they couldn't C# 👓"
      },
      {
        setup: "How many programmers does it take to change a light bulb?",
        punchline: "None. That's a hardware problem. 💡"
      },
      {
        setup: "Why was the computer cold?",
        punchline: "It forgot to close its Windows. 🪟"
      }
    ];

    const revealBtn = document.getElementById("revealBtn");
    const setup = document.getElementById("setup");
    const punchline = document.getElementById("punchline");
    let currentJokeIndex = -1;

    function getNextJokeIndex() {
      if (jokes.length <= 1) return 0;

      let nextIndex = currentJokeIndex;
      while (nextIndex === currentJokeIndex) {
        nextIndex = Math.floor(Math.random() * jokes.length);
      }
      return nextIndex;
    }

    function loadNextJoke() {
      currentJokeIndex = getNextJokeIndex();
      setup.textContent = jokes[currentJokeIndex].setup;
      punchline.textContent = jokes[currentJokeIndex].punchline;
      punchline.hidden = true;
      revealBtn.textContent = "Reveal punchline";
    }

    loadNextJoke();

    revealBtn.addEventListener("click", () => {
      if (punchline.hidden) {
        punchline.hidden = false;
        revealBtn.textContent = "Next joke";
      } else {
        loadNextJoke();
      }
    });
  </script>
</body>
</html>
