<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Git Demo App</title>
  <style>
    /* Basic page styling */
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
    }

    /* Card styling */
    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    /* Button styling */
    button {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      margin-right: 10px;
    }

    button:hover {
      background: #4338ca;
    }

    /* Output text */
    .output {
      margin-top: 15px;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <h1>Git Demo App</h1>

<div class="card">
    <h2>Joke Button</h2>
    <p>Click the button to see a random joke!</p>
    <button id="jokeBtn">Tell me a joke</button>
    <button id="jokeClear">Clear</button>
    <div id="jokeOutput" class="output"></div>
</div>

<div class="card">
    <h2>Click Counter</h2>
    <p>How many times can you click?</p>
    <button id="countBtn">Click me!</button>
    <button id="countReset">Reset</button>
    <div id="countOutput" class="output">Clicks: 0</div>
</div>

  <script>
    // List of jokes
    var jokes = [
      "Why did the student eat his homework? Because the teacher said it was a piece of cake!",
      "What do you call a boomerang that won't come back? A stick!",
      "Why don't scientists trust atoms? Because they make up everything!"
    ];
  
    // Get the button and output area
    var jokeBtn = document.getElementById('jokeBtn');
    var jokeOutput = document.getElementById('jokeOutput');
    var jokeClear = document.getElementById('jokeClear');
  
    // When joke button is clicked, show a random joke
    jokeBtn.onclick = function() {
      var randomNumber = Math.floor(Math.random() * jokes.length);
      jokeOutput.textContent = jokes[randomNumber];
    };
  
    // When clear button is clicked, clear the joke
    jokeClear.onclick = function() {
      jokeOutput.textContent = '';
    };

    // Click counter
var clicks = 0;
var countBtn = document.getElementById('countBtn');
var countOutput = document.getElementById('countOutput');
var countReset = document.getElementById('countReset');

// When count button is clicked, add 1
countBtn.onclick = function() {
  clicks = clicks + 1;
  countOutput.textContent = 'Clicks: ' + clicks;
};

// When reset is clicked, go back to 0
countReset.onclick = function() {
  clicks = 0;
  countOutput.textContent = 'Clicks: 0';
};

  </script>

</body>
</html>
